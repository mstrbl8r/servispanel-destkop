<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ServisPanel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
  .wrap {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 55%, #1e1b4b 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    -webkit-user-select: none;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .logo {
    width: 84px; height: 84px;
    border-radius: 20px;
    background: linear-gradient(135deg, #6366f1, #4338ca);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    box-shadow: 0 12px 40px rgba(99,102,241,.45);
    margin-bottom: 22px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 12px 40px rgba(99,102,241,.45); }
    50%      { transform: scale(1.06); box-shadow: 0 16px 50px rgba(99,102,241,.65); }
  }
  h1 {
    color: #fff;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: .3px;
    margin-bottom: 4px;
  }
  .sub {
    color: rgba(255,255,255,.45);
    font-size: 12px;
    margin-bottom: 28px;
  }
  .bar-track {
    width: 160px;
    height: 4px;
    background: rgba(255,255,255,.12);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, #6366f1, #a5b4fc);
    border-radius: 4px;
    animation: load 1.1s ease-in-out infinite;
  }
  @keyframes load {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }
  .status {
    margin-top: 14px;
    color: rgba(255,255,255,.35);
    font-size: 11px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">⚡</div>
    <h1>ServisPanel</h1>
    <div class="sub">Teknik Servis Yönetim Sistemi</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="status" id="status">Başlatılıyor…</div>
  </div>
  <script>
    const msgs = ['Bağlantı kuruluyor…', 'Panel yükleniyor…', 'Hazırlanıyor…'];
    let i = 0;
    setInterval(() => {
      i = (i + 1) % msgs.length;
      document.getElementById('status').textContent = msgs[i];
    }, 1200);
  </script>
</body>
</html>
