<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ServisPanel — Bağlantı Yok</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
  }
  .box { text-align: center; padding: 40px; max-width: 420px; }
  .icon { font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  p { color: rgba(255,255,255,.6); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
  button {
    background: linear-gradient(135deg, #6366f1, #4338ca);
    color: #fff;
    border: none;
    padding: 13px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  button:hover { opacity: .85; }
  .status { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,.4); }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>Bağlantı Kurulamadı</h1>
    <p>
      İnternet bağlantınızı kontrol edin veya<br>
      teknikcepte.com sunucusuna şu anda erişilemiyor olabilir.
    </p>
    <button onclick="retry()">🔄 Yeniden Dene</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    function retry() {
      document.getElementById('status').textContent = 'Bağlanılıyor…';
      window.desktopApp.retryConnection();
    }
    // Otomatik yeniden deneme - her 10 saniyede
    setInterval(() => {
      if (navigator.onLine) retry();
    }, 10000);
  </script>
</body>
</html>
